{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="ChaosWing is a Django-powered butterfly graph explorer for Polymarket events.">
    <title>{% block title %}ChaosWing{% endblock %}</title>
    {% now "U" as asset_version %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'web/css/tokens.css' %}?v={{ asset_version }}">
    <link rel="stylesheet" href="{% static 'web/css/base.css' %}?v={{ asset_version }}">
    <link rel="stylesheet" href="{% static 'web/css/layout.css' %}?v={{ asset_version }}">
    <link rel="stylesheet" href="{% static 'web/css/components.css' %}?v={{ asset_version }}">
    <link rel="stylesheet" href="{% static 'web/css/dashboard.css' %}?v={{ asset_version }}">
    <link rel="stylesheet" href="{% static 'web/css/motion.css' %}?v={{ asset_version }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script type="module" src="{% static 'web/js/main.js' %}?v={{ asset_version }}"></script>
</body>
</html>
