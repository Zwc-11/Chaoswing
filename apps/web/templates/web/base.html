{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            name="description"
            content="{{ share_meta.description|default:'ChaosWing is a graph-first causal intelligence system for prediction markets. Paste one Polymarket URL and explore a live butterfly graph.' }}"
        />
        <meta
            property="og:title"
            content="{{ share_meta.title|default:'ChaosWing - Butterfly Effect Engine for Prediction Markets' }}"
        />
        <meta
            property="og:description"
            content="{{ share_meta.description|default:'Paste one Polymarket URL. ChaosWing resolves the event, maps every causal chain, and surfaces the butterfly effects you never saw coming.' }}"
        />
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="ChaosWing" />
        {% if share_meta.url %}
        <meta property="og:url" content="{{ share_meta.url }}" />
        {% endif %}
        {% if share_meta.image_url %}
        <meta property="og:image" content="{{ share_meta.image_url }}" />
        <meta property="og:image:alt" content="{{ share_meta.image_alt|default:'ChaosWing preview image' }}" />
        {% endif %}
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="{{ share_meta.title|default:'ChaosWing - Butterfly Effect Engine for Prediction Markets' }}"
        />
        <meta
            name="twitter:description"
            content="{{ share_meta.description|default:'Paste one Polymarket URL. ChaosWing resolves the event, maps every causal chain, and surfaces the butterfly effects you never saw coming.' }}"
        />
        {% if share_meta.image_url %}
        <meta name="twitter:image" content="{{ share_meta.image_url }}" />
        {% endif %}
        <meta name="theme-color" content="#030305" />
        <title>{% block title %}ChaosWing{% endblock %}</title>
        {% now "U" as asset_version %}
        <link
            rel="icon"
            type="image/png"
            href="{% static 'web/img/chaoswing-icon.png' %}?v={{ asset_version }}"
        />
        <link
            rel="apple-touch-icon"
            href="{% static 'web/img/chaoswing-icon.png' %}?v={{ asset_version }}"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="{% static 'web/css/tokens.css' %}?v={{ asset_version }}"
        />
        <link
            rel="stylesheet"
            href="{% static 'web/css/base.css' %}?v={{ asset_version }}"
        />
        <link
            rel="stylesheet"
            href="{% static 'web/css/layout.css' %}?v={{ asset_version }}"
        />
        <link
            rel="stylesheet"
            href="{% static 'web/css/components.css' %}?v={{ asset_version }}"
        />
        <link
            rel="stylesheet"
            href="{% static 'web/css/panels.css' %}?v={{ asset_version }}"
        />
        <link
            rel="stylesheet"
            href="{% static 'web/css/overlays.css' %}?v={{ asset_version }}"
        />
        <link
            rel="stylesheet"
            href="{% static 'web/css/dashboard.css' %}?v={{ asset_version }}"
        />
        <link
            rel="stylesheet"
            href="{% static 'web/css/motion.css' %}?v={{ asset_version }}"
        />
        {% block extra_head %}{% endblock %}
    </head>
    <body>
        {% block body %}{% endblock %}
        <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
        <script
            type="module"
            src="{% static 'web/js/main.js' %}?v={{ asset_version }}"
        ></script>
    </body>
</html>
