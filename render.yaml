databases:
  - name: chaoswing-db
    plan: free
    databaseName: chaoswing
    user: chaoswing

services:
  - type: web
    name: chaoswing
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn chaoswing.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "chaos-wing.com,www.chaos-wing.com,.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://chaos-wing.com,https://www.chaos-wing.com"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "0"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "1"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "1"
      - key: DJANGO_TRUST_X_FORWARDED_PROTO
        value: "1"
      - key: CHAOSWING_ENABLE_REMOTE_FETCH
        value: "1"
      - key: CHAOSWING_ENABLE_LLM
        value: "1"
      - key: CHAOSWING_RATE_LIMIT_ENABLED
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: "claude-sonnet-4-6"
      - key: DATABASE_URL
        fromDatabase:
          name: chaoswing-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.8"
